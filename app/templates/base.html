<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RDA{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <meta name="theme-color" content="#0f4c81">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CETEM Flow">
  <script>
    // Aplica o tema salvo ANTES do render para evitar flash de tela clara.
    (function () {
      try {
        const t = localStorage.getItem('rda-theme') || 'light';
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {{ 'ok' if category == 'success' else '' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  {% if current_user.is_authenticated %}
    <button type="button" id="themeFab" title="Alternar tema claro/escuro" aria-label="Alternar tema" onclick="toggleTheme()">
      <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <script>
      window.toggleTheme = function () {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        if (isDark) {
          html.removeAttribute('data-theme');
          localStorage.setItem('rda-theme', 'light');
        } else {
          html.setAttribute('data-theme', 'dark');
          localStorage.setItem('rda-theme', 'dark');
        }
        syncThemeIcon();
      };
      function syncThemeIcon() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const sun = document.getElementById('themeIconSun');
        const moon = document.getElementById('themeIconMoon');
        if (!sun || !moon) return;
        sun.style.display = isDark ? 'block' : 'none';
        moon.style.display = isDark ? 'none' : 'block';
      }
      syncThemeIcon();
    </script>

    <button type="button" id="calcFab" title="Abrir calculadora" aria-label="Abrir calculadora" onclick="toggleCalc()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="8" y2="18"/><line x1="12" y1="18" x2="12" y2="18"/><line x1="16" y1="18" x2="16" y2="18"/></svg>
    </button>
    <div id="calcPanel" role="dialog" aria-label="Calculadora">
      <div class="calc-header">
        <strong>Calculadora</strong>
        <button type="button" class="calc-close" onclick="toggleCalc()" aria-label="Fechar" title="Fechar">×</button>
      </div>
      <input id="calcDisplay" type="text" readonly value="0">
      <div class="calc-grid">
        <button type="button" class="calc-btn calc-op" data-key="C">C</button>
        <button type="button" class="calc-btn calc-op" data-key="BS">⌫</button>
        <button type="button" class="calc-btn calc-op" data-key="(">(</button>
        <button type="button" class="calc-btn calc-op" data-key=")">)</button>

        <button type="button" class="calc-btn" data-key="7">7</button>
        <button type="button" class="calc-btn" data-key="8">8</button>
        <button type="button" class="calc-btn" data-key="9">9</button>
        <button type="button" class="calc-btn calc-op" data-key="/">÷</button>

        <button type="button" class="calc-btn" data-key="4">4</button>
        <button type="button" class="calc-btn" data-key="5">5</button>
        <button type="button" class="calc-btn" data-key="6">6</button>
        <button type="button" class="calc-btn calc-op" data-key="*">×</button>

        <button type="button" class="calc-btn" data-key="1">1</button>
        <button type="button" class="calc-btn" data-key="2">2</button>
        <button type="button" class="calc-btn" data-key="3">3</button>
        <button type="button" class="calc-btn calc-op" data-key="-">−</button>

        <button type="button" class="calc-btn" data-key="0">0</button>
        <button type="button" class="calc-btn" data-key=".">.</button>
        <button type="button" class="calc-btn calc-eq" data-key="=">=</button>
        <button type="button" class="calc-btn calc-op" data-key="+">+</button>
      </div>
    </div>

    <style>
      #calcFab {
        position: fixed; right: 20px; bottom: 20px; z-index: 2000;
        width: 56px; height: 56px; border-radius: 50%;
        background: #0f4c81; color: #fff; border: none; cursor: pointer;
        box-shadow: 0 6px 18px rgba(15,23,42,0.25);
        display: flex; align-items: center; justify-content: center;
      }
      #calcFab svg { width: 28px; height: 28px; }
      #calcFab:hover { background: #1f6fb2; }
      #calcPanel {
        display: none; position: fixed; right: 20px; bottom: 88px; z-index: 2001;
        width: 260px; background: #fff; border-radius: 14px;
        box-shadow: 0 12px 32px rgba(15,23,42,0.22); padding: 12px;
        border: 1px solid #e5e7eb;
      }
      #calcPanel.open { display: block; }
      .calc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .calc-close { background: transparent; border: none; font-size: 22px; cursor: pointer; color: #64748b; padding: 0 6px; line-height: 1; }
      .calc-close:hover { color: #0f4c81; }
      #calcDisplay {
        width: 100%; text-align: right; font-size: 20px; font-weight: 700;
        padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px;
        background: #f8fafc; color: #1f2937; margin-bottom: 10px;
      }
      .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .calc-btn {
        padding: 10px 0; font-size: 14px; font-weight: 600; border-radius: 8px;
        border: 1px solid #e2e8f0; background: #fff; cursor: pointer; color: #1f2937;
      }
      .calc-btn:hover { background: #f1f5f9; }
      .calc-op { background: #e0f2fe; color: #0369a1; }
      .calc-op:hover { background: #bae6fd; }
      .calc-eq { background: #0f4c81; color: #fff; }
      .calc-eq:hover { background: #1f6fb2; }
    </style>

    <script>
      (function () {
        const panel = document.getElementById('calcPanel');
        const display = document.getElementById('calcDisplay');
        let expr = '';

        window.toggleCalc = function () {
          panel.classList.toggle('open');
        };

        function render() {
          display.value = expr || '0';
        }

        function evaluate() {
          if (!expr) return;
          const limpo = expr.replace(/[^0-9+\-*/().]/g, '');
          if (!limpo) { expr = ''; render(); return; }
          try {
            const r = Function('"use strict"; return (' + limpo + ')')();
            if (r === undefined || r === null || Number.isNaN(r) || !isFinite(r)) {
              expr = 'Erro';
            } else {
              expr = String(Number.isInteger(r) ? r : Math.round(r * 1e10) / 1e10);
            }
          } catch (e) {
            expr = 'Erro';
          }
          render();
        }

        function press(key) {
          if (expr === 'Erro') expr = '';
          if (key === 'C') { expr = ''; }
          else if (key === 'BS') { expr = expr.slice(0, -1); }
          else if (key === '=') { evaluate(); return; }
          else { expr += key; }
          render();
        }

        document.querySelectorAll('#calcPanel .calc-btn').forEach(function (b) {
          b.addEventListener('click', function () { press(b.dataset.key); });
        });

        // Teclado (apenas quando o painel estiver aberto e nenhum input do app em foco)
        document.addEventListener('keydown', function (ev) {
          if (!panel.classList.contains('open')) return;
          const tag = (ev.target.tagName || '').toLowerCase();
          if (tag === 'input' && ev.target !== display) return;
          if (tag === 'textarea' || tag === 'select') return;
          const k = ev.key;
          if (/^[0-9.+\-*/()]$/.test(k)) { press(k); ev.preventDefault(); }
          else if (k === 'Enter' || k === '=') { press('='); ev.preventDefault(); }
          else if (k === 'Backspace') { press('BS'); ev.preventDefault(); }
          else if (k === 'Escape') { press('C'); ev.preventDefault(); }
        });

        render();
      })();
    </script>
  {% endif %}

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
