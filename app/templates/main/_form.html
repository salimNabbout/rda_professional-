<form method="post" action="{{ url_for('main.save_record') }}">
  <input type="hidden" name="id" value="{{ form.id if form else '' }}">

  <div class="grid grid-2">
    <div>
      <label>Nome do Colaborador</label>
      <input name="colaborador" value="{{ form.colaborador if form and form.colaborador else current_user.display_name }}" readonly required>
    </div>
    <div>
      <label>Cliente</label>
      <input name="cliente" value="{{ form.cliente if form else '' }}" required>
    </div>
  </div>

  <div style="margin-top:16px;">
    <label>Data</label>
    <input type="date" name="data" value="{{ form.data if form else '' }}" required>
  </div>

  <fieldset style="margin-top:16px; padding:12px; border:1px solid #d9e1f2; border-radius:8px;">
    <legend style="padding:0 8px; font-weight:600; color:#1f2d5a;">Período da Manhã</legend>
    <div class="grid grid-2">
      <div>
        <label>Hora Início</label>
        <input type="time" name="hora_inicio_manha" value="{{ form.hora_inicio_manha if form else '' }}">
      </div>
      <div>
        <label>Hora Final</label>
        <input type="time" name="hora_final_manha" value="{{ form.hora_final_manha if form else '' }}">
      </div>
    </div>
  </fieldset>

  <fieldset style="margin-top:12px; padding:12px; border:1px solid #d9e1f2; border-radius:8px;">
    <legend style="padding:0 8px; font-weight:600; color:#1f2d5a;">Período da Tarde</legend>
    <div class="grid grid-2">
      <div>
        <label>Hora Início</label>
        <input type="time" name="hora_inicio_tarde" value="{{ form.hora_inicio_tarde if form else '' }}">
      </div>
      <div>
        <label>Hora Final</label>
        <input type="time" name="hora_final_tarde" value="{{ form.hora_final_tarde if form else '' }}">
      </div>
    </div>
    <p style="margin:8px 0 0; font-size:12px; color:#6b7a99;">Campos em branco são considerados zero.</p>
  </fieldset>

  <div style="margin-top:16px;">
    <label>O que foi realizado</label>
    <select id="atividadePredefinida" style="margin-bottom:8px;">
      <option value="">Selecione uma Atividade</option>
      <option>Visita Técnica ou Comercial</option>
      <option>Reunião Técnica ou Comercial</option>
      <option>Elaboração de Proposta</option>
      <option>Projetos</option>
      <option>Desenvolvimento Software PLC</option>
      <option>Desenvolvimento Software IHM</option>
      <option>Desenvolvimento Software SCADA</option>
      <option>Desenvolvimento Software Agêntica</option>
      <option>Design (Telas)</option>
      <option>Montagem de Painéis</option>
      <option>Instalações de Painéis</option>
      <option>Comissionamento</option>
      <option>Partida Assistida</option>
      <option>Treinamento</option>
      <option>Elaboração de DataBook</option>
    </select>
    <textarea name="realizado" id="realizadoTextarea" required placeholder="Selecione uma Atividade">{{ form.realizado if form else '' }}</textarea>
  </div>

  <script>
    (function () {
      const sel = document.getElementById('atividadePredefinida');
      const txt = document.getElementById('realizadoTextarea');
      if (!sel || !txt) return;
      sel.addEventListener('change', function () {
        const v = sel.value;
        if (!v) return;
        const atual = txt.value.trim();
        txt.value = atual ? atual + '\n' + v : v;
        sel.value = '';
        txt.focus();
      });
    })();
  </script>

  <div style="margin-top:16px;">
    <label>Status do RDA</label>
    <select name="status_rda">
      {% set current_status = form.status_rda if form and form.status_rda else 'Em Andamento' %}
      {% for status in ['Em Andamento', 'Concluído', 'Atrasado'] %}
        <option value="{{ status }}" {% if current_status == status %}selected{% endif %}>{{ status }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="actions" style="margin-top:16px;">
    <button type="submit" class="btn-primary">{{ 'Salvar edição' if editing else 'Adicionar ao RDA' }}</button>
    <a class="btn btn-secondary" href="{{ url_for('main.index') }}">Limpar</a>
  </div>
</form>
